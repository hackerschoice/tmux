set -g display-time 10000
set -g history-limit 20000
setw -g monitor-activity on
set -g visual-activity on
set -g status-style fg=black,bg="#0044AA"
set -g @hs_recording 0
set -g status-left '#S '
set -g status-right-length 120
set -g status-right ''

# Testing:
# tmux source-file $(pwd)/tmux.conf

# tmux bug: when a line ends with ; then the last ; is not sent. Use "sed" to fix this:
# PASTE ~/.config/tmux/paste to the remote
bind-key P run-shell ' sed "s/;\$/;;/g" "$HOME/.config/tmux/paste" | while IFS= read -r x; do tmux send-keys -t "#{pane_id}" -l "$x"; tmux send-keys -t "#{pane_id}" C-m; done'

# eval hackshell on the remote
bind-key H run-shell '~/.config/tmux/tmux_hackshell-send.sh "#{pane_id}"'

# Upload a prompted local file to remote current directory using basename.
bind-key U command-prompt -I "" -p "Local file to upload:" \
	'run-shell "~/.config/tmux/tmux_upload.sh \"#{pane_id}\" \"%1\""'

# Download a prompted remote file path to local CWD as basename(remote_path).
# Uses tmux pipe-pane capture (not history scraping) for robust transfers.
bind-key D command-prompt -I "" -p "Remote file to download:" \
	'run-shell "~/.config/tmux/tmux_download.sh \"#{pane_id}\" \"%1\""'

# Record current pane
bind-key R \
	if -F '#{pane_pipe}' \
	'pipe-pane; set @hs_recording 0; set status-style fg=black,bg="#0044AA"; set status-right ""; display-message "Recording: OFF"' \
	'pipe-pane -o "exec cat >>\"\${HOME:?}\"/tmux-rec-#S:#I.#P-#W-\$(date +%s).txt"; set @hs_recording 1; set status-style fg=black,bg=red; set status-right "#[fg=black,bg=red] REC Press C-b R to stop recording #[default]"; display-message "Recording: ON"'

# Screenshot the current pane
bind-key S \
	capture-pane -S -99999 \; \
	run-shell 'tmux save-buffer "${HOME}/tmux-save-#S:#I.#P-#W-$(date +%s).txt"' \; \
	delete-buffer \; \
	display-message 'Saved to ~/tmux-save-#S:#I.#P-#W.txt'

# set -g mouse on
setw -g mode-keys vi
bind-key m \
	if -F '#{mouse}' \
	'set -g mouse off; display-message "mouse: off"' \
	'set -g mouse on; display-message "mouse: on"'
